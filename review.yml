    summary: >-
      Verified live: the Minerva Access institutional repository (DSpace 7.6)
      exposes a working public OAI-PMH 2.0 interface and a self-describing
      DSpace REST/HAL API, and the ArcGIS Hub open spatial-data portal is
      reachable with standard ArcGIS query/download APIs. The university also
      runs an internal Boomi API management developer portal for staff/students,
      but it is gated and not publicly documented, so no endpoints were
      confirmed. Central SSO (Okta, OAuth2/OIDC) exists but offers no public API
      program. An official GitHub org (github.com/unimelb) exists with mostly
      archived repos. No fabricated endpoints — only URLs probed live are
      recorded below. The institution's homepage returns 403 to automated
      clients (bot protection) though it serves normally in a browser.
