---
aid: university-of-melbourne
name: University of Melbourne
description: >-
  The University of Melbourne is Australia's leading research university,
  ranked #24 in the QS World University Rankings 2025. Its public developer
  and API footprint is modest and federated rather than centralized: the
  Library operates the Minerva Access institutional repository on DSpace 7.6,
  which exposes a public OAI-PMH metadata interface and a DSpace REST API,
  and the institution publishes campus GIS data through an ArcGIS Hub open
  spatial-data portal with the standard ArcGIS/Hub query APIs. Internally the
  university runs a Boomi-based API management developer portal for staff and
  students, but that portal is gated and not publicly documented. Identity is
  managed via central SSO (Okta) with OAuth 2.0 / OpenID Connect, but no
  public API program is offered there. An official GitHub organization
  (github.com/unimelb) exists with mostly archived projects.
