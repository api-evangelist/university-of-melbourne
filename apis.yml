  - aid: university-of-melbourne:spatial-open-data
    name: Open Spatial Data Portal (ArcGIS Hub)
    description: >-
      University of Melbourne open spatial-data portal hosted on ArcGIS Hub for
      exploring and downloading campus GIS layers including building, road and
      tree-canopy footprints. Datasets are served through the standard ArcGIS
      Hub / ArcGIS REST query and download APIs (GeoJSON, CSV, Shapefile, KML).
      Portal verified live (HTTP 200).
    humanURL: https://spatialdata-uom.opendata.arcgis.com/
